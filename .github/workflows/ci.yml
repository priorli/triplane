name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs for the same ref when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    # Placeholder build-time env — none of these need to be real. The web build
    # only needs them to be present so module-load-time checks pass. Downstream
    # consumers add real secrets via GitHub environment secrets when they wire
    # up a deploy workflow.
    env:
      DATABASE_URL: "postgresql://user:pass@localhost:5432/db?sslmode=disable"
      DIRECT_URL: "postgresql://user:pass@localhost:5432/db?sslmode=disable"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_ci_placeholder"
      CLERK_SECRET_KEY: "sk_test_ci_placeholder"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      AWS_ACCESS_KEY_ID: "ci"
      AWS_SECRET_ACCESS_KEY: "ci"
      AWS_REGION: "auto"
      AWS_ENDPOINT_URL_S3: "https://example.invalid"
      TIGRIS_BUCKET_NAME: "ci"
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build
        run: bun run build

  android:
    name: Android build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
      - name: Assemble debug APK
        run: ./gradlew :composeApp:assembleDebug

  ios-framework:
    name: iOS framework link
    runs-on: macos-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      # Use the framework link task, not the compile-only task. `compileKotlinIosSimulatorArm64`
      # runs source-level compile but skips the ObjC header exporter — where Phase 4 originally
      # hid an ObjC-export crash. Link is the correct bar.
      - name: Link iOS framework (catches ObjC-export regressions)
        run: ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64
